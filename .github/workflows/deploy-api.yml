# Deploy ASP.NET Core API to Azure App Service (Linux).
# Secrets: AZURE_API_PUBLISH_PROFILE — full XML from App Service → Download publish profile
name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "src/JuniperFox.Api/**"
      - "src/JuniperFox.Application/**"
      - "src/JuniperFox.Infrastructure/**"
      - "src/JuniperFox.Domain/**"
      - "src/JuniperFox.Contracts/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish src/JuniperFox.Api/JuniperFox.Api.csproj -c Release -o "${{ github.workspace }}/publish-api"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: "${{ github.workspace }}/publish-api"
