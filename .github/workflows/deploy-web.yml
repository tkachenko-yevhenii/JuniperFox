# Deploy Blazor WASM to Azure Static Web Apps.
# Secrets: AZURE_STATIC_WEB_APPS_API_TOKEN — Static Web App → Manage deployment token
# Variables: JUNIPERFOX_API_URL — public API base URL, e.g. https://my-api.azurewebsites.net/
name: Deploy Web (Static Web Apps)

on:
  push:
    branches: [main]
    paths:
      - "src/JuniperFox.Web/**"
      - "src/JuniperFox.Contracts/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Configure WASM API URL (Production)
        run: |
          test -n "${{ vars.JUNIPERFOX_API_URL }}" || (echo "Set repo variable JUNIPERFOX_API_URL" && exit 1)
          printf '%s\n' '{"ApiBaseAddress":"'"${{ vars.JUNIPERFOX_API_URL }}"'"}' > src/JuniperFox.Web/wwwroot/appsettings.Production.json

      - name: Publish Blazor WASM
        run: dotnet publish src/JuniperFox.Web/JuniperFox.Web.csproj -c Release -o published

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: published/wwwroot
          api_location: ""
          skip_app_build: true
