# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - dev-juniperfox

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Root has JuniperFox.slnx only — publish must target the API host explicitly.
      - name: Publish API
        run: dotnet publish src/JuniperFox.Api/JuniperFox.Api.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      # Kudu zip deploy: picks the publishProfile whose publishUrl contains "scm" (not the first
      # profile in the file). azure/webapps-deploy@v3 only reads the first <publishProfile> and
      # cross-checks userName vs app-name — that often fails with multi-profile .PublishSettings.
      - name: Zip site
        run: zip -rq "$GITHUB_WORKSPACE/site.zip" .

      - name: Deploy to Azure (Kudu zip)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python3 << 'PY'
          import base64
          import os
          import ssl
          import urllib.error
          import urllib.request
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          prof = None
          for p in root.iter():
              if not p.tag.endswith("publishProfile"):
                  continue
              url = (p.get("publishUrl") or "").lower()
              if "scm" in url and "ftp" not in url:
                  prof = p
                  break
          if prof is None:
              raise SystemExit("No SCM publishProfile found (expected publishUrl with .scm.)")

          host = (prof.get("publishUrl") or "").split(":")[0].strip()
          user = prof.get("userName") or ""
          pwd = prof.get("userPWD") or ""
          zip_url = f"https://{host}/api/zipdeploy"

          zip_path = os.path.join(os.environ["GITHUB_WORKSPACE"], "site.zip")
          body = open(zip_path, "rb").read()

          req = urllib.request.Request(zip_url, data=body, method="POST")
          token = base64.b64encode(f"{user}:{pwd}".encode("utf-8")).decode("ascii")
          req.add_header("Authorization", f"Basic {token}")
          req.add_header("Content-Type", "application/zip")

          ctx = ssl.create_default_context()
          try:
              with urllib.request.urlopen(req, context=ctx, timeout=600) as resp:
                  print(resp.status, resp.reason)
          except urllib.error.HTTPError as e:
              print(e.read().decode(errors="replace"))
              raise
          PY
          