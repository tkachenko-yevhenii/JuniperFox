services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: juniperfox
      POSTGRES_PASSWORD: juniperfox_dev
      POSTGRES_DB: juniperfox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juniperfox -d juniperfox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
